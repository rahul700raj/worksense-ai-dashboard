version: '3.8'

services:
  attrition-api:
    build: .
    container_name: worksense-attrition-api
    ports:
      - "8000:8000"
    volumes:
      - ./attrition_model.pkl:/app/attrition_model.pkl
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - MODEL_PATH=/app/attrition_model.pkl
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
